# ------------------------------------------------------------------------------
# DERIVED SUMMARY (for quick planner comparison; harness may recompute)
# ------------------------------------------------------------------------------
summary:
  setup1_operation_count: 19
  setup2_operation_count: 1
  total_operations: 20
  distinct_tools:
    - "ALU-POWER 3/8\" 3F Flat"       # endmill 0.375
    - "FLASHSOLID 1/2\" 3F Bull"       # bullnose 0.5 (some entries R0.03)
    - "Harvey 3/16\" 3F Flat"          # endmill 0.1875
    - "ALU-POWER 1/8\" 3F Flat"        # endmill 0.125
    - "Harvey 1/4\" 4F Ball"           # ball 0.25
    - "Harvey 1/8\" 3F Ball"           # ball 0.125
    - "1.5\" 6F Face Mill"             # face mill 1.5
  strategy_types_used:
    - roughing            # adaptive rough, batched by tool
    - finishing_floor
    - finishing_wall
    - finishing           # contour surface finishing
    - finishing_fillet
    - facing
  feature_categories_machined:
    - Face                # faced / floored
    - Contour Surface     # 3D surface finishing incl. ball tools
    - Wall                # dedicated wall finishing passes
    - Filleted Pocket
    - Filleted Blind Hole
    - Through Hole        # finished as a wall, NOT drilled
    - Profile             # outer profile rough + finish
    - Outer Fillet
  # Planner-relevant observations:
  # - Batched by (tool, strategy): op1=81 feats, op7=28 feats. Planner emits
  #   per-feature pairs -> structural mismatch, not a bug.
  # - Ball endmills used for contour-surface finishing (ops 14,15). Planner emits none.
  # - Through Hole #1 and Filleted Blind Hole #1 are finished as WALL/FLOOR passes
  #   with a 1/2" bullnose endmill (ops 9,10,13) -- NOT drilled. Confirms the large
  #   central hole is contoured, not drilled; planner's holes->drill is too rigid.
  # - No dedicated drilling/tapping op appears in this program at all.
  # - Feeds pull the SAME AluWrought_* presets the planner resolves against.

# ------------------------------------------------------------------------------
# FEATURE-ID MAPPING NOTE
# ------------------------------------------------------------------------------
# Toolpath feature names (Face #N, Wall #N, Contour Surface #N, etc.) are display
# names, NOT cascade feature_ids. The harness must map these to cascade ids to
# compute per-feature coverage. Two known linkages from prior cascade GT:
#   - cascade feature 14 <-> Filleted Blind Hole (Ø ~101.75 mm / 4.006 in)
#   - cascade feature 15 <-> Through Hole (Ø ~81.28 mm / 3.2 in)
# For other features, match by (class_name family + diameter/size) where possible;
# where a confident mapping isn't available, compare at the AGGREGATE level
# (op counts by strategy, tool set, feature-category coverage) rather than forcing
# a per-feature id match. Aggregate comparison is the reliable signal here.
