# Ground-truth CAM program for 96260B REAR — transcribed from Toolpath shop program.
#
# SOURCE: Screenshots of the actual Toolpath program a machinist ran for this part.
#         Not machine-exported; hand-transcribed from the operations UI. Treat as
#         "what an experienced machinist actually did," NOT a theoretically optimal
#         plan. A few cuts were reported slightly inaccurate by the shop; operation
#         set / tools / sequence are the reliable part, exact feeds less so.
#
# SCOPE: This is the eval `operations:` block the harness consumes to grade the
#        planner's emitted CamPlan (operation coverage, op-type agreement, tool
#        agreement, sequence, and loose feed/speed ratio).
#
# KEY STRUCTURAL FACT (for whoever reads this): the shop batches by (tool, strategy)
#        across MANY features per operation (op 1 = 81 features, op 7 = 28), and
#        orders rough->finish and coarse-tool->fine-tool. The planner currently
#        emits per-feature rough+finish pairs. Divergence is expected and is the
#        point of the eval.
#
# UNITS: as displayed in Toolpath = inch tools, feeds in in/min, rpm as shown.
#        Feature names are Toolpath's display names (Face #N, Contour Surface #N,
#        Wall #N, Filleted Pocket #N, Profile #N, Outer Fillet #N, Through Hole #N,
#        Filleted Blind Hole #N) — NOT cascade feature_ids. Mapping to cascade ids
#        is the harness's job; see notes at bottom.
#
# "features_shown" lists only the features legible in the screenshot (top 4 of N);
# "feature_count" is the true total from the op header. Where the full list wasn't
# visible, features_shown is a partial sample and feature_count is authoritative.

